  # build-hardened:
  #   needs: security-scan
  #   runs-on: ubuntu-latest
  #   container:
  #     image: golang@sha256:<pin-the-exact-digest-here>   # not a mutable tag
  #   steps:
  #     - uses: actions/checkout@v4
  #     - run: go build -o server .
  #     # Independent clean reference build + reproducible-build gate:
  #     - run: docker run --rm -v "$PWD":/app -w /app golang:1.22-alpine go build -o /tmp/ref .
  #     - run: bash ../verify_reproducible.sh /tmp/ref server   # fails the build if they differ
